<svg viewBox="0 0 290 40" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- 渐变 -->
    <linearGradient id="gradAI" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <!-- 发光 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .word {
      fill: currentColor;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      font-size: 24px;
    }
    .highlight {
      fill: url(#gradAI);
      font-weight: 700;
      filter: url(#glow);
    }
    @media (prefers-color-scheme: dark) {
      #gradAI stop:first-child { stop-color: #d8b4fe; }
      #gradAI stop:last-child { stop-color: #a78bfa; }
    }
  </style>

  <!-- 左侧波形图标 -->
  <g transform="translate(0,6)">
    <rect x="0" y="8" width="3" height="10" rx="1.5" fill="url(#gradAI)" />
    <rect x="6" y="3" width="3" height="20" rx="1.5" fill="url(#gradAI)" />
    <rect x="12" y="0" width="3" height="26" rx="1.5" fill="url(#gradAI)" />
    <rect x="18" y="3" width="3" height="20" rx="1.5" fill="url(#gradAI)" />
    <rect x="24" y="8" width="3" height="10" rx="1.5" fill="url(#gradAI)" />
  </g>

  <!-- 品牌文字 -->
  <text x="38" y="28" class="word">
    Voice-Labs.<tspan class="highlight">AI</tspan>
  </text>
</svg>
